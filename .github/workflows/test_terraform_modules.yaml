name: Terraform modules tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/**'
      - 'bind-operator/terraform/**'
      - 'dns-integrator-operator/terraform/**'
      - 'dns-policy-operator/terraform/**'
      - 'dns-resolver-operator/terraform/**'
      - 'dns-secondary-operator/terraform/**'

jobs:
  terraform-tests:
    uses: canonical/operator-workflows/.github/workflows/terraform_modules_test.yaml@main
    secrets: inherit
    with:
      lxd-controller: true
      terraform-directories: '["terraform", "bind-operator/terraform", "dns-integrator-operator/terraform", "dns-policy-operator/terraform", "dns-resolver-operator/terraform", "dns-secondary-operator/terraform"]'
